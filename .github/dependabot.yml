# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Bundle all GitHub Actions bumps into a single PR instead of one per action.
    groups:
      github-actions:
        patterns:
          - "*"

  # Python dependencies are managed with uv (pyproject.toml + uv.lock), so the
  # "uv" ecosystem is the single source of truth here. A separate "pip"
  # ecosystem would double up PRs for the same packages, so it is intentionally
  # omitted. All Python bumps are bundled into one grouped PR.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      uv-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-compose:
        patterns:
          - "*"
